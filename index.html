<!DOCTYPE html><html lang="en"><head>
<meta property="og:title" content="Epoch Converter — DevKit">
<meta property="og:description" content="Free online Epoch Converter tool — fast, simple, and no signup required.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://479464887-rgb.github.io/epoch-converter/">
<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://479464887-rgb.github.io/epoch-converter/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Convert Unix timestamps to human-readable dates"><title>Epoch Converter — DevKit Tools</title><style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--text2:#8b949e;--accent:#58a6ff;--radius:6px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;}
.header a{color:var(--text);text-decoration:none;font-size:13px;}
.container{max-width:700px;margin:0 auto;padding:32px 24px;flex:1;width:100%;}
h1{font-size:24px;color:#f0f6fc;margin-bottom:24px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;}
input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px;color:var(--text);font-size:14px;font-family:monospace;}
input:focus{outline:none;border-color:var(--accent);}
.btn{background:#238636;color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-size:13px;cursor:pointer;margin-top:8px;}
.btn:hover{background:#2ea043;}
.result{font-size:14px;line-height:2;padding:12px;background:var(--bg);border-radius:var(--radius);margin-top:12px;}
.result span{color:var(--accent);font-weight:500;}
.now{font-size:12px;color:var(--text2);margin-top:4px;cursor:pointer;}
.now:hover{color:var(--accent);}
/* 响应式设计 */
@media (max-width: 768px) {
  body { padding: 12px; }
  header { padding: 12px 16px; flex-direction: column; }
  .container { max-width: 100%; padding: 0 8px; }
  h1 { font-size: 1.5rem; }
  textarea, input, select, button { width: 100%; }
  .grid { grid-template-columns: 1fr; }
  .card { padding: 12px; }
}</style></head><body>
<div class="header"><a href="https://devkit-tools.xyz">← DevKit</a><span style="color:var(--text2);font-size:13px;">Epoch Converter</span></div>
<div class="container"><h1>🕐 Epoch Converter</h1>
<div class="card">
<label>Unix Timestamp (seconds)</label><input id="ts-input" placeholder="e.g. 1700000000">
<div class="now" onclick="document.getElementById('ts-input').value=Math.floor(Date.now()/1000);convert()">← Now: <span id="now-ts"></span></div>
<button class="btn" onclick="convert()">Convert</button>
<div class="result" id="ts-result"></div>
</div>
<div class="card">
<label>Date & Time</label><input type="datetime-local" id="dt-input">
<button class="btn" onclick="toTimestamp()">→ Timestamp</button>
<div class="result" id="dt-result"></div>
</div></div>
<script>
document.getElementById('now-ts').textContent=Math.floor(Date.now()/1000);
function convert(){const ts=parseInt(document.getElementById('ts-input').value);if(!ts){document.getElementById('ts-result').textContent='Enter a timestamp';return}const d=new Date(ts*1000);document.getElementById('ts-result').innerHTML=`<span>UTC:</span> ${d.toUTCString()}<br><span>Local:</span> ${d.toString()}<br><span>ISO:</span> ${d.toISOString()}<br><span>Milliseconds:</span> ${ts*1000}`}
function toTimestamp(){const v=document.getElementById('dt-input').value;if(!v){document.getElementById('dt-result').textContent='Select date';return}const ts=Math.floor(new Date(v).getTime()/1000);document.getElementById('dt-result').innerHTML=`<span>Timestamp:</span> ${ts}<br><span>Milliseconds:</span> ${ts*1000}`}
document.getElementById('ts-input').value=Math.floor(Date.now()/1000);convert();
</script></body></html>
